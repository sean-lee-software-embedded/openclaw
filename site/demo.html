<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Board Auto Demo</title>
  <style>
    :root{--bg:#0d1117;--panel:#161b22;--card:#1c2333;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--border:#30363d;--green:#3fb950}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:22px 18px 40px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    h1{margin:0;font-size:28px}.sub{color:var(--muted);font-size:14px}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn:hover{filter:brightness(1.08)}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:18px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}
    .step{padding:12px;border-radius:12px;border:1px solid transparent;margin-bottom:10px;background:rgba(255,255,255,.02);transition:.2s}
    .step.active{border-color:var(--accent);background:rgba(88,166,255,.08)}
    .step.done{border-color:rgba(63,185,80,.35);background:rgba(63,185,80,.08)}
    .step-title{font-weight:600;margin-bottom:6px}.step-desc{font-size:13px;color:var(--muted);line-height:1.5}
    .viewer{position:relative;min-height:760px;padding:0;overflow:hidden}
    iframe{width:100%;height:760px;border:0;background:#fff;border-radius:16px}
    .caption{position:absolute;left:16px;right:16px;bottom:16px;background:rgba(13,17,23,.82);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
    .caption-title{font-size:16px;font-weight:700;margin-bottom:4px}.caption-desc{font-size:13px;color:var(--muted);line-height:1.5}
    .progress{height:8px;background:#0b0f14;border-radius:999px;overflow:hidden;margin-top:12px;border:1px solid var(--border)}
    .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .25s linear}
    .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--muted)}
    @media (max-width:900px){.layout{grid-template-columns:1fr}.viewer{min-height:560px} iframe{height:560px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Auto Demo</h1>
        <div class="sub">自動輪播展示 Board / Backlog / Sprints / Reports / Daily Brief</div>
      </div>
      <div class="controls">
        <button class="btn primary" id="playBtn">▶ Start Auto Demo</button>
        <button class="btn" id="pauseBtn">⏸ Pause</button>
        <button class="btn" id="nextBtn">⏭ Next</button>
        <button class="btn" id="restartBtn">↺ Restart</button>
      </div>
    </div>

    <div class="layout">
      <div class="panel">
        <div id="steps"></div>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div class="meta"><span id="counter">Step 1 / 5</span><span id="timer">5s</span></div>
      </div>
      <div class="panel viewer">
        <iframe id="frame" src="./board.html"></iframe>
        <div class="caption">
          <div class="caption-title" id="capTitle"></div>
          <div class="caption-desc" id="capDesc"></div>
        </div>
      </div>
    </div>
  </div>
<script>
const slides = [
  { title:'Board View', desc:'展示 Kanban board：To Do / In Progress / In Review / Done。可拖動卡片、快速看到 sprint 進度。', url:'./board.html', seconds:6 },
  { title:'Backlog & Sprint Planning', desc:'展示 backlog 規劃與 issue 移動到 sprint 的能力，適合 sprint planning。', url:'./board.html?view=backlog#backlog', seconds:6 },
  { title:'Sprints', desc:'展示 sprint overview、start/complete sprint 與剩餘 points 管理。', url:'./board.html?view=sprints#sprints', seconds:6 },
  { title:'Reports', desc:'展示 status、priority、epic、velocity、assignee workload 等統計。', url:'./board.html?view=reports#reports', seconds:6 },
  { title:'Daily Brief', desc:'展示每天自動更新的產業情報頁：Cloud Server / OpenBMC / AI。', url:'./news.html', seconds:7 }
];
let index = 0, playing = false, timer = null, remaining = slides[0].seconds, startedAt = null;
const frame = document.getElementById('frame');
const capTitle = document.getElementById('capTitle');
const capDesc = document.getElementById('capDesc');
const stepsEl = document.getElementById('steps');
const bar = document.getElementById('bar');
const counter = document.getElementById('counter');
const timerEl = document.getElementById('timer');
function renderSteps(){
  stepsEl.innerHTML = slides.map((s,i)=>`<div class="step ${i===index?'active':''} ${i<index?'done':''}" onclick="goTo(${i})"><div class="step-title">${i+1}. ${s.title}</div><div class="step-desc">${s.desc}</div></div>`).join('');
}
function updateSlide(){
  const s = slides[index];
  frame.src = s.url;
  capTitle.textContent = s.title;
  capDesc.textContent = s.desc;
  counter.textContent = `Step ${index+1} / ${slides.length}`;
  renderSteps();
  startedAt = Date.now();
  updateProgress();
}
function updateProgress(){
  const s = slides[index];
  const elapsed = (Date.now()-startedAt)/1000;
  const pct = Math.min(100, (elapsed/s.seconds)*100);
  const left = Math.max(0, Math.ceil(s.seconds - elapsed));
  bar.style.width = pct+'%';
  timerEl.textContent = left + 's';
}
function tick(){
  if(!playing) return;
  updateProgress();
  const s = slides[index];
  if((Date.now()-startedAt)/1000 >= s.seconds){ next(); }
}
function play(){ if(playing) return; playing = true; if(!startedAt) startedAt = Date.now(); timer = setInterval(tick, 250); }
function pause(){ playing = false; clearInterval(timer); timer = null; }
function next(){ clearInterval(timer); timer=null; index = (index+1) % slides.length; updateSlide(); if(playing) timer = setInterval(tick,250); }
function restart(){ clearInterval(timer); timer=null; index=0; updateSlide(); playing=true; timer=setInterval(tick,250); }
function goTo(i){ index=i; clearInterval(timer); timer=null; updateSlide(); if(playing) timer=setInterval(tick,250); }
window.goTo = goTo;
document.getElementById('playBtn').onclick = ()=>{ if(!startedAt) updateSlide(); play(); };
document.getElementById('pauseBtn').onclick = pause;
document.getElementById('nextBtn').onclick = next;
document.getElementById('restartBtn').onclick = restart;
updateSlide();
</script>
</body>
</html>
