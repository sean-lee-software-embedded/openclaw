<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 龍蝦 Board</title>
<style>
  :root {
    --bg:       #1a1a2e;
    --surface:  #16213e;
    --card:     #0f3460;
    --accent:   #e94560;
    --text:     #eaeaea;
    --muted:    #8892a4;
    --border:   #2a3a5c;
    --success:  #2ecc71;
    --warning:  #f39c12;
    --danger:   #e74c3c;
    --purple:   #9b59b6;
    --blue:     #3498db;
    --green:    #27ae60;
    --gray:     #7f8c8d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.3rem; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; background: transparent; color: var(--muted); transition: all .2s; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: var(--border); color: var(--text); }

  /* ── views ── */
  .view { display: none; padding: 20px 24px; }
  .view.active { display: block; }

  /* ── kanban ── */
  .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; min-height: calc(100vh - 130px); }
  .column { flex: 0 0 280px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; max-height: calc(100vh - 130px); }
  .col-header { padding: 12px 16px; font-weight: 600; font-size: 0.95rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .col-count { background: var(--border); border-radius: 12px; padding: 2px 8px; font-size: 0.75rem; color: var(--muted); }
  .col-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* ── card ── */
  .card { background: var(--card); border-radius: 8px; padding: 12px; border: 1px solid var(--border); position: relative; }
  .card-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .badge.high   { background: #4a1020; color: #e94560; }
  .badge.medium { background: #4a3a10; color: #f39c12; }
  .badge.low    { background: #0a3a20; color: #2ecc71; }
  .badge.points { background: var(--border); color: var(--muted); }
  .label-chip { font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; }
  .card-actions { display: flex; gap: 4px; margin-top: 10px; }
  .btn-move { background: var(--border); border: none; color: var(--muted); border-radius: 4px; padding: 3px 8px; cursor: pointer; font-size: 0.75rem; transition: all .2s; }
  .btn-move:hover { background: var(--accent); color: #fff; }
  .btn-del { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; position: absolute; top: 8px; right: 8px; opacity: 0.5; }
  .btn-del:hover { opacity: 1; color: var(--danger); }

  /* ── add card ── */
  .add-card-btn { margin: 12px; padding: 8px; border: 1px dashed var(--border); background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; font-size: 0.85rem; width: calc(100% - 24px); transition: all .2s; }
  .add-card-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── scrum ── */
  .sprint-header { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 16px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .sprint-info { flex: 1; }
  .sprint-info h3 { font-size: 1rem; margin-bottom: 4px; }
  .sprint-info p  { color: var(--muted); font-size: 0.85rem; }
  .sprint-progress { display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 160px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--success); border-radius: 4px; transition: width .4s; }
  .progress-text { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: var(--card); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { filter: brightness(1.1); }
  .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
  .no-sprint { text-align: center; color: var(--muted); padding: 60px 0; }
  .no-sprint p { margin-bottom: 16px; font-size: 1rem; }

  /* scrum board inside sprint */
  .scrum-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
  .scrum-board .column { flex: 0 0 240px; }

  /* backlog section */
  .backlog-section { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 16px 20px; margin-top: 20px; }
  .backlog-section h3 { font-size: 0.95rem; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-size: 0.8rem; }
  .backlog-list { display: flex; flex-direction: column; gap: 8px; }
  .backlog-item { background: var(--card); border-radius: 6px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
  .backlog-item .title { flex: 1; font-size: 0.88rem; }
  .btn-add-sprint { background: var(--border); border: none; color: var(--text); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; }
  .btn-add-sprint:hover { background: var(--blue); color: #fff; }

  /* burndown */
  .burndown-section { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 16px 20px; margin-top: 20px; }
  .burndown-section h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; font-size: 0.8rem; }
  svg.burndown { width: 100%; height: 200px; }

  /* ── modal ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 5px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 12px; font-size: 0.88rem; outline: none;
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .label-checks { display: flex; flex-wrap: wrap; gap: 8px; }
  .label-check { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 0.82rem; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── util ── */
  .empty { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 20px 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>🦞 龍蝦 Board</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('kanban')">📋 Kanban</button>
    <button class="tab" onclick="switchTab('scrum')">🏃 Scrum</button>
  </div>
</header>

<!-- ═══════════════════ KANBAN ═══════════════════ -->
<div id="view-kanban" class="view active">
  <div class="kanban-board" id="kanban-board"></div>
</div>

<!-- ═══════════════════ SCRUM ═══════════════════ -->
<div id="view-scrum" class="view">
  <div id="sprint-area"></div>
  <div class="backlog-section">
    <h3>📥 Backlog（點擊加入 Sprint）</h3>
    <div class="backlog-list" id="backlog-list"></div>
    <button class="add-card-btn" style="margin:12px 0 0" onclick="openModal(null, null)">＋ 新增 Story / Task</button>
  </div>
</div>

<!-- ═══════════════════ MODAL ═══════════════════ -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <h2 id="modal-title">新增卡片</h2>
    <div class="form-group">
      <label>標題 *</label>
      <input id="f-title" placeholder="Story / task 標題">
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="f-desc" placeholder="詳細說明..."></textarea>
    </div>
    <div class="form-group">
      <label>類型</label>
      <select id="f-type">
        <option value="story">📖 Story</option>
        <option value="task">✅ Task</option>
        <option value="bug">🐛 Bug</option>
      </select>
    </div>
    <div class="form-group" style="display:flex;gap:12px">
      <div style="flex:1">
        <label>Story Points</label>
        <input id="f-points" type="number" min="0" max="100" value="0">
      </div>
      <div style="flex:1">
        <label>優先度</label>
        <select id="f-priority">
          <option value="high">🔴 高</option>
          <option value="medium" selected>🟡 中</option>
          <option value="low">🟢 低</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Labels</label>
      <div class="label-checks" id="label-checks"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitCard()">新增</button>
    </div>
  </div>
</div>

<!-- Sprint Modal -->
<div class="modal-bg" id="sprint-modal-bg" onclick="closeSprintModalBg(event)">
  <div class="modal">
    <h2>建立 Sprint</h2>
    <div class="form-group">
      <label>Sprint 名稱</label>
      <input id="sf-name" placeholder="e.g. Sprint 1">
    </div>
    <div class="form-group">
      <label>目標</label>
      <textarea id="sf-goal" placeholder="這個 sprint 要達成什麼？"></textarea>
    </div>
    <div class="form-group" style="display:flex;gap:12px">
      <div style="flex:1"><label>開始日期</label><input id="sf-start" type="date"></div>
      <div style="flex:1"><label>結束日期</label><input id="sf-end" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSprintModal()">取消</button>
      <button class="btn btn-primary" onclick="submitSprint()">建立</button>
    </div>
  </div>
</div>

<script>
const API = 'https://192.168.1.101:3333/api';

const LABELS = [
  { id: 'cloud',   name: 'Cloud/BMC', color: '#3b82f6' },
  { id: 'ai',      name: 'AI',        color: '#8b5cf6' },
  { id: 'infra',   name: 'Infra',     color: '#10b981' },
  { id: 'bug',     name: 'Bug',       color: '#ef4444' },
  { id: 'feature', name: 'Feature',   color: '#f59e0b' },
  { id: 'chore',   name: 'Chore',     color: '#6b7280' },
];

const KANBAN_COLS = [
  { id: 'backlog',     title: '📥 Backlog' },
  { id: 'todo',        title: '📋 To Do' },
  { id: 'in_progress', title: '⚙️ In Progress' },
  { id: 'review',      title: '👀 Review' },
  { id: 'done',        title: '✅ Done' },
];
const KANBAN_ORDER = KANBAN_COLS.map(c => c.id);

const SCRUM_COLS = [
  { id: 's_todo',        title: 'To Do' },
  { id: 's_in_progress', title: 'In Progress' },
  { id: 's_review',      title: 'In Review' },
  { id: 's_done',        title: '✅ Done' },
];
const SCRUM_ORDER = SCRUM_COLS.map(c => c.id);

let board = { cards: [], sprints: [], labels: LABELS };
let modalContext = null; // { targetCol, sprintId }

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadBoard() {
  try {
    board = await api('/board');
  } catch(e) {
    console.warn('Board API not available, using empty state:', e.message);
  }
  render();
}

// ── tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(name === 'kanban' ? 'kanban' : 'scrum'))
      t.classList.add('active');
  });
  render();
}

// ── render ───────────────────────────────────────────────────────────────────
function render() {
  const active = document.querySelector('.view.active').id;
  if (active === 'view-kanban') renderKanban();
  if (active === 'view-scrum')  renderScrum();
}

// ── kanban ───────────────────────────────────────────────────────────────────
function renderKanban() {
  const el = document.getElementById('kanban-board');
  el.innerHTML = '';
  for (const col of KANBAN_COLS) {
    const cards = board.cards.filter(c => c.kanban_column === col.id);
    el.appendChild(makeKanbanCol(col, cards));
  }
}

function makeKanbanCol(col, cards) {
  const div = document.createElement('div');
  div.className = 'column';
  div.innerHTML = `
    <div class="col-header">
      <span>${col.title}</span>
      <span class="col-count">${cards.length}</span>
    </div>
    <div class="col-body" id="col-${col.id}">
      ${cards.length === 0 ? '<div class="empty">空的</div>' : ''}
    </div>
    <button class="add-card-btn" onclick="openModal('${col.id}', null)">＋ 新增卡片</button>
  `;
  const body = div.querySelector('.col-body');
  cards.forEach(card => body.appendChild(makeCard(card, 'kanban')));
  return div;
}

function makeCard(card, mode) {
  const div = document.createElement('div');
  div.className = 'card';

  const labelHtml = (card.labels || []).map(lid => {
    const l = LABELS.find(x => x.id === lid);
    return l ? `<span class="label-chip" style="background:${l.color}22;color:${l.color}">${l.name}</span>` : '';
  }).join('');

  const priorityLabel = { high: '🔴 高', medium: '🟡 中', low: '🟢 低' }[card.priority] || '🟡 中';

  let moveHtml = '';
  if (mode === 'kanban') {
    const idx = KANBAN_ORDER.indexOf(card.kanban_column);
    if (idx > 0)
      moveHtml += `<button class="btn-move" onclick="moveCard('${card.id}','kanban','${KANBAN_ORDER[idx-1]}')">◀</button>`;
    if (idx < KANBAN_ORDER.length - 1)
      moveHtml += `<button class="btn-move" onclick="moveCard('${card.id}','kanban','${KANBAN_ORDER[idx+1]}')">▶</button>`;
  } else {
    const idx = SCRUM_ORDER.indexOf(card.scrum_column);
    if (idx > 0)
      moveHtml += `<button class="btn-move" onclick="moveCard('${card.id}','scrum','${SCRUM_ORDER[idx-1]}')">◀</button>`;
    if (idx < SCRUM_ORDER.length - 1)
      moveHtml += `<button class="btn-move" onclick="moveCard('${card.id}','scrum','${SCRUM_ORDER[idx+1]}')">▶</button>`;
  }

  div.innerHTML = `
    <button class="btn-del" onclick="deleteCard('${card.id}')">✕</button>
    <div class="card-title">${esc(card.title)}</div>
    <div class="card-meta">
      <span class="badge ${card.priority || 'medium'}">${priorityLabel}</span>
      ${card.story_points ? `<span class="badge points">${card.story_points} pts</span>` : ''}
      ${labelHtml}
    </div>
    ${moveHtml ? `<div class="card-actions">${moveHtml}</div>` : ''}
  `;
  return div;
}

async function moveCard(id, mode, targetCol) {
  const body = mode === 'kanban' ? { kanban_column: targetCol } : { scrum_column: targetCol };
  await api('/cards/' + id + '/move', 'PATCH', body);
  await loadBoard();
}

async function deleteCard(id) {
  if (!confirm('刪除這張卡片？')) return;
  await api('/cards/' + id, 'DELETE');
  await loadBoard();
}

// ── scrum ────────────────────────────────────────────────────────────────────
function renderScrum() {
  const area = document.getElementById('sprint-area');
  const activeSprint = board.sprints.find(s => s.status === 'active');

  if (!activeSprint) {
    area.innerHTML = `
      <div class="no-sprint">
        <p>目前沒有進行中的 Sprint</p>
        <button class="btn btn-primary" onclick="openSprintModal()">＋ 建立 Sprint</button>
      </div>
    `;
  } else {
    const sprintCards = board.cards.filter(c => c.sprint_id === activeSprint.id);
    const totalPts    = sprintCards.reduce((s, c) => s + (c.story_points || 0), 0);
    const donePts     = sprintCards.filter(c => c.scrum_column === 's_done').reduce((s, c) => s + (c.story_points || 0), 0);
    const pct         = totalPts ? Math.round(donePts / totalPts * 100) : 0;

    area.innerHTML = `
      <div class="sprint-header">
        <div class="sprint-info">
          <h3>${esc(activeSprint.name)}</h3>
          <p>${esc(activeSprint.goal || '無 Sprint 目標')} &nbsp;·&nbsp; ${activeSprint.start_date} → ${activeSprint.end_date}</p>
        </div>
        <div class="sprint-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${donePts} / ${totalPts} pts</span>
        </div>
        <button class="btn btn-sm btn-secondary" onclick="completeSprint('${activeSprint.id}')">完成 Sprint</button>
      </div>
      <div class="scrum-board" id="scrum-board"></div>
      <div class="burndown-section">
        <h3>📉 Burndown Chart</h3>
        <svg class="burndown" id="burndown-svg"></svg>
      </div>
    `;

    const scrumBoard = document.getElementById('scrum-board');
    for (const col of SCRUM_COLS) {
      const cards = sprintCards.filter(c => c.scrum_column === col.id);
      const colDiv = document.createElement('div');
      colDiv.className = 'column';
      colDiv.innerHTML = `
        <div class="col-header">
          <span>${col.title}</span>
          <span class="col-count">${cards.length}</span>
        </div>
        <div class="col-body"></div>
      `;
      const body = colDiv.querySelector('.col-body');
      if (cards.length === 0) body.innerHTML = '<div class="empty">空的</div>';
      cards.forEach(c => body.appendChild(makeCard(c, 'scrum')));
      scrumBoard.appendChild(colDiv);
    }

    drawBurndown(activeSprint, sprintCards);
  }

  // backlog
  const backlogList = document.getElementById('backlog-list');
  const backlogCards = board.cards.filter(c => !c.sprint_id);
  backlogList.innerHTML = '';
  if (backlogCards.length === 0) {
    backlogList.innerHTML = '<div class="empty">Backlog 是空的，新增一些 Story 吧！</div>';
  } else {
    backlogCards.forEach(c => {
      const item = document.createElement('div');
      item.className = 'backlog-item';
      item.innerHTML = `
        <span class="badge ${c.priority || 'medium'}">${{high:'🔴',medium:'🟡',low:'🟢'}[c.priority||'medium']}</span>
        <span class="title">${esc(c.title)}</span>
        ${c.story_points ? `<span class="badge points">${c.story_points}p</span>` : ''}
        ${activeSprint ? `<button class="btn-add-sprint" onclick="addToSprint('${c.id}','${activeSprint.id}')">Sprint へ →</button>` : ''}
        <button class="btn-del" style="position:static;opacity:.5" onclick="deleteCard('${c.id}')">✕</button>
      `;
      backlogList.appendChild(item);
    });
  }
}

async function addToSprint(cardId, sprintId) {
  await api('/cards/' + cardId + '/move', 'PATCH', { sprint_id: sprintId, scrum_column: 's_todo' });
  await loadBoard();
}

async function completeSprint(sprintId) {
  if (!confirm('完成這個 Sprint？未完成的卡片會移回 Backlog。')) return;
  await api('/sprints/' + sprintId + '/complete', 'POST', {});
  await loadBoard();
}

// ── burndown ──────────────────────────────────────────────────────────────────
function drawBurndown(sprint, cards) {
  const svg = document.getElementById('burndown-svg');
  if (!svg) return;

  const W = svg.clientWidth || 600, H = 200;
  const pad = { top: 20, right: 20, bottom: 30, left: 40 };
  const iW = W - pad.left - pad.right;
  const iH = H - pad.top - pad.bottom;

  const start = new Date(sprint.start_date);
  const end   = new Date(sprint.end_date);
  const days  = Math.max((end - start) / 86400000, 1);
  const total = cards.reduce((s, c) => s + (c.story_points || 0), 0);
  if (!total) { svg.innerHTML = '<text x="50%" y="50%" fill="#8892a4" text-anchor="middle" font-size="13">沒有 Story Points</text>'; return; }

  const today = new Date();

  // ideal line
  const idealPts = [{ d: 0, p: total }, { d: days, p: 0 }];

  // actual line (simplified: count done cards)
  const donePts = cards.filter(c => c.scrum_column === 's_done').reduce((s, c) => s + (c.story_points || 0), 0);
  const elapsed = Math.min(Math.max((today - start) / 86400000, 0), days);
  const actualPts = [{ d: 0, p: total }, { d: elapsed, p: total - donePts }];

  const x = d => pad.left + (d / days) * iW;
  const y = p => pad.top  + (1 - p / total) * iH;

  const line = pts => pts.map((pt, i) => `${i === 0 ? 'M' : 'L'}${x(pt.d).toFixed(1)},${y(pt.p).toFixed(1)}`).join(' ');

  // axis labels
  let labels = '';
  for (let i = 0; i <= Math.min(days, 10); i++) {
    const d = new Date(start.getTime() + i * (days / Math.min(days, 10)) * 86400000);
    const lx = x(i * (days / Math.min(days, 10)));
    labels += `<text x="${lx.toFixed(1)}" y="${(H - 6).toFixed(1)}" fill="#8892a4" font-size="10" text-anchor="middle">${(d.getMonth()+1)}/${d.getDate()}</text>`;
  }

  svg.innerHTML = `
    <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top+iH}" stroke="#2a3a5c" stroke-width="1"/>
    <line x1="${pad.left}" y1="${pad.top+iH}" x2="${pad.left+iW}" y2="${pad.top+iH}" stroke="#2a3a5c" stroke-width="1"/>
    ${labels}
    <text x="${(pad.left-6).toFixed(1)}" y="${y(total).toFixed(1)}" fill="#8892a4" font-size="10" text-anchor="end">${total}</text>
    <text x="${(pad.left-6).toFixed(1)}" y="${(pad.top+iH).toFixed(1)}" fill="#8892a4" font-size="10" text-anchor="end">0</text>
    <path d="${line(idealPts)}" fill="none" stroke="#2a3a5c" stroke-width="2" stroke-dasharray="6,3"/>
    <path d="${line(actualPts)}" fill="none" stroke="#e94560" stroke-width="2.5"/>
    <circle cx="${x(elapsed).toFixed(1)}" cy="${y(total-donePts).toFixed(1)}" r="4" fill="#e94560"/>
    <text x="${(pad.left+iW-4).toFixed(1)}" y="${(pad.top+14).toFixed(1)}" fill="#2a3a5c" font-size="10" text-anchor="end">── ideal</text>
    <text x="${(pad.left+iW-4).toFixed(1)}" y="${(pad.top+26).toFixed(1)}" fill="#e94560" font-size="10" text-anchor="end">── actual</text>
  `;
}

// ── modal ────────────────────────────────────────────────────────────────────
function openModal(kanbanCol, sprintId) {
  modalContext = { kanbanCol: kanbanCol || 'backlog', sprintId };
  document.getElementById('modal-title').textContent = '新增卡片';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value  = '';
  document.getElementById('f-type').value  = 'story';
  document.getElementById('f-points').value = '0';
  document.getElementById('f-priority').value = 'medium';

  const checks = document.getElementById('label-checks');
  checks.innerHTML = LABELS.map(l =>
    `<label class="label-check">
      <input type="checkbox" value="${l.id}" style="accent-color:${l.color}">
      <span class="label-chip" style="background:${l.color}22;color:${l.color}">${l.name}</span>
    </label>`
  ).join('');

  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalBg(e) { if (e.target.id === 'modal-bg') closeModal(); }

async function submitCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('請輸入標題'); return; }
  const labels = [...document.querySelectorAll('#label-checks input:checked')].map(i => i.value);
  const body = {
    title,
    description:    document.getElementById('f-desc').value,
    type:           document.getElementById('f-type').value,
    story_points:   parseInt(document.getElementById('f-points').value) || 0,
    priority:       document.getElementById('f-priority').value,
    labels,
    kanban_column:  modalContext.kanbanCol || 'backlog',
    sprint_id:      modalContext.sprintId || null,
    scrum_column:   modalContext.sprintId ? 's_todo' : 's_todo',
  };
  await api('/cards', 'POST', body);
  closeModal();
  await loadBoard();
}

// ── sprint modal ──────────────────────────────────────────────────────────────
function openSprintModal() {
  const today = new Date().toISOString().split('T')[0];
  const two   = new Date(Date.now() + 14*86400000).toISOString().split('T')[0];
  document.getElementById('sf-name').value  = `Sprint ${(board.sprints.length + 1)}`;
  document.getElementById('sf-goal').value  = '';
  document.getElementById('sf-start').value = today;
  document.getElementById('sf-end').value   = two;
  document.getElementById('sprint-modal-bg').classList.add('open');
}
function closeSprintModal() { document.getElementById('sprint-modal-bg').classList.remove('open'); }
function closeSprintModalBg(e) { if (e.target.id === 'sprint-modal-bg') closeSprintModal(); }

async function submitSprint() {
  const name = document.getElementById('sf-name').value.trim();
  if (!name) { alert('請輸入 Sprint 名稱'); return; }
  const sprint = await api('/sprints', 'POST', {
    name,
    goal:       document.getElementById('sf-goal').value,
    start_date: document.getElementById('sf-start').value,
    end_date:   document.getElementById('sf-end').value,
  });
  await api('/sprints/' + sprint.id + '/start', 'POST', {});
  closeSprintModal();
  await loadBoard();
}

// ── util ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── init ──────────────────────────────────────────────────────────────────────
loadBoard();
</script>
